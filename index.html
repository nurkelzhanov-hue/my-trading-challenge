<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>10$ to 10,000$ Trading Challenge Dashboard (100 Days)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; margin: 0; padding: 20px; color: #f8fafc; }
    .container { max-width: 1250px; margin: auto; background: #1e293b; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    h1 { color: #38bdf8; text-align: center; margin-bottom: 5px; font-size: 28px; font-weight: bold; }
    .subtitle { text-align: center; color: #94a3b8; margin-bottom: 30px; font-size: 14px; }
    
    .chart-container { width: 100%; height: 350px; margin-bottom: 40px; background: #0f172a; padding: 15px; border-radius: 8px; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #334155; padding: 12px; text-align: center; font-size: 14px; }
    th { background: #0f172a; color: #38bdf8; font-weight: 600; position: sticky; top: 0; z-index: 10; }
    tr:nth-child(even) { background: #1e293b; }
    
    input { width: 80px; padding: 6px; text-align: center; border: 1px solid #475569; border-radius: 4px; background: #0f172a; color: white; font-weight: bold; }
    select { padding: 6px 10px; border-radius: 20px; font-weight: bold; cursor: pointer; border: 1px solid #475569; background: #0f172a; color: white; outline: none; }
    
    /* Status ranglari */
    .status-pending { background: #475569; color: #cbd5e1; }
    .status-success { background: #16a34a; color: white; }
    .status-warning { background: #ca8a04; color: white; }
    .status-danger { background: #dc2626; color: white; }
    .status-goal { background: #7c3aed; color: white; animation: pulse 2s infinite; }

    /* Qator ranglari */
    .profit-row { background-color: rgba(22, 163, 74, 0.15) !important; }
    .warning-row { background-color: rgba(202, 138, 4, 0.15) !important; }
    .loss-row { background-color: rgba(220, 38, 38, 0.15) !important; }
    
    .text-profit { color: #4ade80; font-weight: bold; }
    .text-loss { color: #f87171; font-weight: bold; }
    
    .reset-btn { background: #dc2626; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-bottom: 15px; float: right; }
    .reset-btn:hover { background: #b91c1c; }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<div class="container">
  <button class="reset-btn" onclick="resetChallenge()">Chellengeni Tozalash 🔄</button>
  <h1>🚀 10$ dan 10,000$ gacha Trading Challenge (100 kun)</h1>
  <div class="subtitle">Kunlik minimal maqsad: 10% foyda | Jami: 100 Savdo Kuni | Ruchnoy boshqaruv va brauzer xotirasi faol</div>
  
  <div class="chart-container">
    <canvas id="challengeChart"></canvas>
  </div>

  <table id="challengeTable">
    <thead>
      <tr>
        <th>Kun</th>
        <th>Boshlang'ich Balans ($)</th>
        <th>Kunlik Foyda / Zarar (%)</th>
        <th>Natija Miqdori ($)</th>
        <th>Yopilish Balansi ($)</th>
        <th>Kunlik Status (Holat)</th>
      </tr>
    </thead>
    <tbody id="tableBody">
       </tbody>
  </table>
</div>

<script>
  const totalDays = 100; // 100 kunlik tizimga o'tkazildi
  let balances = new Array(totalDays).fill(0);
  balances[0] = 10.00; 

  let userStatus = [];
  let userProfits = [];

  // --- BRAUZER XOTIRASIDAN YUKLASH (Kalit nomi 100 kunga moslab yangilandi) ---
  let savedStatus = localStorage.getItem('c10k_status_100days');
  let savedProfits = localStorage.getItem('c10k_profits_100days');

  if (savedStatus && savedProfits) {
    userStatus = JSON.parse(savedStatus);
    userProfits = JSON.parse(savedProfits);
  } else {
    for (let i = 0; i < totalDays; i++) {
      userStatus.push('pending'); // Boshida hamma kun kutilmoqda
      userProfits.push(0);        // Boshida foyda foizi 0%
    }
  }

  function calculateData() {
    for(let i = 0; i < totalDays; i++) {
      let startBal = balances[i];
      let pPercent = userProfits[i];
      let pAmount = startBal * (pPercent / 100);
      let endBal = startBal + pAmount;

      if (endBal < 0) endBal = 0;

      if (i < totalDays - 1) {
        balances[i+1] = endBal;
      }
    }
    
    // Ma'lumotlarni saqlash
    localStorage.setItem('c10k_status_100days', JSON.stringify(userStatus));
    localStorage.setItem('c10k_profits_100days', JSON.stringify(userProfits));

    renderTable();
    updateChart();
  }

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    
    for(let i = 0; i < totalDays; i++) {
      let startBal = balances[i];
      let pPercent = userProfits[i];
      let pAmount = startBal * (pPercent / 100);
      let endBal = startBal + pAmount;
      if (endBal < 0) endBal = 0;
      
      let row = document.createElement('tr');
      let status = userStatus[i];
      
      if (endBal >= 10000 && status === 'success') {
        row.className = 'profit-row';
      } else if (status === 'success') {
        row.className = 'profit-row';
      } else if (status === 'warning') {
        row.className = 'warning-row';
      } else if (status === 'loss') {
        row.className = 'loss-row';
      }

      let selectHTML = `
        <select class="status-${status}" onchange="updateDayStatus(${i}, this.value)">
          <option value="pending" ${status === 'pending' ? 'selected' : ''}>Kutilmoqda ⏳</option>
          <option value="success" ${status === 'success' ? 'selected' : ''}>Bajarildi ✅</option>
          <option value="warning" ${status === 'warning' ? 'selected' : ''}>Kam Foyda ⚠️</option>
          <option value="loss" ${status === 'loss' ? 'selected' : ''}>Zarar (Minus) ❌</option>
        </select>
      `;

      // Agar o'sha kuni balans 10,000 dan oshsa va status muvaffaqiyatli bo'lsa marra nishoni chiqadi
      if (endBal >= 10000 && status === 'success') {
        selectHTML = '<span class="status-badge status-goal">MARRA ERISHILDI 🎉</span>';
      }
      
      let resultSign = pPercent >= 0 ? `+$${pAmount.toFixed(2)}` : `-$${Math.abs(pAmount).toFixed(2)}`;
      let resultClass = pPercent >= 0 ? 'text-profit' : 'text-loss';

      row.innerHTML = `
        <td><b>${i+1}</b></td>
        <td>$${startBal.toFixed(2)}</td>
        <td><input type="number" step="0.1" value="${pPercent}" onchange="updateProfit(${i}, this.value)">%</td>
        <td class="${resultClass}">${resultSign}</td>
        <td><b>$${endBal.toFixed(2)}</b></td>
        <td>${selectHTML}</td>
      `;
      tbody.appendChild(row);
    }
  }

  function updateProfit(index, value) {
    userProfits[index] = parseFloat(value) || 0;
    calculateData();
  }

  function updateDayStatus(index, statusValue) {
    userStatus[index] = statusValue;
    
    if (statusValue === 'success' && userProfits[index] === 0) {
      userProfits[index] = 10.0; // Standart reja 10%
    } else if (statusValue === 'loss' && userProfits[index] >= 0) {
      userProfits[index] = -5.0;  // Standart zarar -5%
    } else if (statusValue === 'pending') {
      userProfits[index] = 0;
    }
    calculateData();
  }

  function resetChallenge() {
    if (confirm("Rostdan ham barcha 100 kunlik ma'lumotlarni o'chirib, chellengeni boshlang'ich holatga qaytarmoqchimisiz?")) {
      localStorage.removeItem('c10k_status_100days');
      localStorage.removeItem('c10k_profits_100days');
      userStatus = [];
      userProfits = [];
      for (let i = 0; i < totalDays; i++) {
        userStatus.push('pending');
        userProfits.push(0);
      }
      calculateData();
    }
  }

  const ctx = document.getElementById('challengeChart').getContext('2d');
  let challengeChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: Array.from({length: totalDays}, (_, i) => `${i+1}-kun`),
      datasets: [{
        label: 'Real Balans ($)',
        data: [],
        borderColor: '#38bdf8',
        backgroundColor: 'rgba(56, 189, 248, 0.07)',
        borderWidth: 2.5,
        fill: true,
        tension: 0.2
      }]
    },
    options: { 
      responsive: true, 
      maintainAspectRatio: false,
      scales: { 
        y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
      },
      plugins: { legend: { labels: { color: '#f8fafc' } } }
    }
  });

  function updateChart() {
    let closingBalances = [];
    for(let i=0; i<totalDays; i++) {
      let cBal = balances[i] + (balances[i] * (userProfits[i]/100));
      closingBalances.push(cBal < 0 ? 0 : cBal);
    }
    challengeChart.data.datasets[0].data = closingBalances;
    challengeChart.update();
  }

  calculateData();
</script>
</body>
</html>
