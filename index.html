<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>10$ to 10,000$ Trading Challenge Dashboard (v3)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
    .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h1 { color: #1e3c72; text-align: center; margin-bottom: 5px; }
    .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
    .chart-container { width: 100%; height: 350px; margin-bottom: 40px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    th, td { border: 1px solid #e0e0e0; padding: 12px; text-align: center; }
    th { background: #1e3c72; color: white; font-weight: 600; }
    tr:nth-child(even) { background: #f9fbfd; }
    
    /* Input uslubi */
    input { width: 80px; padding: 6px; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; }
    
    /* Dinamik Rangli Statuslar */
    .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; }
    .status-success { background-color: #28a745; color: white; }
    .status-warning { background-color: #ffc107; color: #212529; }
    .status-danger { background-color: #dc3545; color: white; }
    .status-goal { background-color: #6f42c1; color: white; animation: pulse 2s infinite; }

    /* Qator ranglari */
    .profit-row { background-color: #e6f4ea !important; }
    .warning-row { background-color: #fffde7 !important; }
    .loss-row { background-color: #fce8e6 !important; }
    
    .text-profit { color: #137333; font-weight: bold; }
    .text-loss { color: #c5221f; font-weight: bold; }
    
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🚀 10$ dan 10,000$ gacha Trading Challenge</h1>
  <div class="subtitle">Kunlik minimal maqsad: 10% foyda. Minus (zarar) holatini kiritish uchun raqam boshiga minus parchasini qo'ying (Masalan: -5)</div>
  
  <div class="chart-container">
    <canvas id="challengeChart"></canvas>
  </div>

  <table id="challengeTable">
    <thead>
      <tr>
        <th>Kun</th>
        <th>Boshlang'ich Balans ($)</th>
        <th>Kunlik Foyda / Zarar (%)</th>
        <th>Natija Miqdori ($)</th>
        <th>Yopilish Balansi ($)</th>
        <th>Kunlik Status (Holat)</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      </tbody>
  </table>
</div>

<script>
  const totalDays = 60;
  let balances = new Array(totalDays).fill(0);
  let profits = new Array(totalDays).fill(15); // Standart baseline 15% foyda
  balances[0] = 10.00; 

  function calculateData() {
    for(let i = 0; i < totalDays; i++) {
      let startBal = balances[i];
      let pPercent = profits[i];
      let pAmount = startBal * (pPercent / 100);
      let endBal = startBal + pAmount;

      if (endBal < 0) endBal = 0;

      if (i < totalDays - 1) {
        balances[i+1] = endBal;
      }
    }
    renderTable();
    updateChart();
  }

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    
    for(let i = 0; i < totalDays; i++) {
      let startBal = balances[i];
      let pPercent = profits[i];
      let pAmount = startBal * (pPercent / 100);
      let endBal = startBal + pAmount;
      if (endBal < 0) endBal = 0;
      
      let row = document.createElement('tr');
      let statusHTML = '';
      
      // Foiz stavkasiga qarab status va ranglarni aniqlash
      if (endBal >= 10000) {
        row.className = 'profit-row';
        statusHTML = '<span class="status-badge status-goal">MARRA ERISHILDI 🎉</span>';
      } else if (pPercent >= 10) {
        row.className = 'profit-row';
        statusHTML = '<span class="status-badge status-success">Maqsad Bajarildi ✅</span>';
      } else if (pPercent > 0 && pPercent < 10) {
        row.className = 'warning-row';
        statusHTML = '<span class="status-badge status-warning">Kam Foyda ⚠️</span>';
      } else if (pPercent === 0) {
        statusHTML = '<span class="status-badge" style="background:#e0e0e0;">Savdo Bo\'lmadi</span>';
      } else {
        row.className = 'loss-row';
        statusHTML = '<span class="status-badge status-danger">Zarar Ko\'rildi ❌</span>';
      }
      
      let resultSign = pPercent >= 0 ? `+$${pAmount.toFixed(2)}` : `-$${Math.abs(pAmount).toFixed(2)}`;
      let resultClass = pPercent >= 0 ? 'text-profit' : 'text-loss';

      row.innerHTML = `
        <td><b>${i+1}</b></td>
        <td>$${startBal.toFixed(2)}</td>
        <td><input type="number" step="0.1" value="${pPercent}" onchange="updateProfit(${i}, this.value)">%</td>
        <td class="${resultClass}">${resultSign}</td>
        <td><b>$${endBal.toFixed(2)}</b></td>
        <td>${statusHTML}</td>
      `;
      tbody.appendChild(row);
    }
  }

  function updateProfit(index, value) {
    profits[index] = parseFloat(value) || 0;
    calculateData();
  }

  // Grafik sozlamalari
  const ctx = document.getElementById('challengeChart').getContext('2d');
  let challengeChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: Array.from({length: totalDays}, (_, i) => `${i+1}-kun`),
      datasets: [{
        label: 'Balans ($)',
        data: [],
        borderColor: '#1e3c72',
        backgroundColor: 'rgba(30, 60, 114, 0.05)',
        borderWidth: 2.5,
        fill: true,
        tension: 0.2
      }]
    },
    options: { 
      responsive: true, 
      maintainAspectRatio: false,
      scales: { y: { beginAtZero: true } }
    }
  });

  function updateChart() {
    let closingBalances = [];
    for(let i=0; i<totalDays; i++) {
      let cBal = balances[i] + (balances[i] * (profits[i]/100));
      closingBalances.push(cBal < 0 ? 0 : cBal);
    }
    challengeChart.data.datasets[0].data = closingBalances;
    challengeChart.update();
  }

  calculateData();
</script>
</body>
</html>
